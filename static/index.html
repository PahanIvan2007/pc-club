<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Club</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <nav>
            <div class="nav-container">
                <router-link to="/" class="logo">PC Club</router-link>
                <div class="nav-links">
                    <router-link to="/">Главная</router-link>
                    <router-link to="/players">Игроки</router-link>
                    <router-link to="/tournaments">Турниры</router-link>
                </div>
            </div>
        </nav>
        <main>
            <router-view></router-view>
        </main>
    </div>

    <script>
const API = '/api'

const Home = {
    template: `
        <div>
            <div class="hero">
                <h1>PC Club</h1>
                <p>Киберспортивный клуб — турниры, рейтинги, статистика</p>
            </div>
            <div class="stats">
                <div class="stat-card"><h3>{{ stats.total_players }}</h3><p>Игроков</p></div>
                <div class="stat-card"><h3>{{ stats.total_tournaments }}</h3><p>Турниров</p></div>
            </div>
            <div class="sections">
                <div class="section">
                    <h2>Топ игроков</h2>
                    <table>
                        <tr><th>#</th><th>Имя</th><th>Ник</th><th>Часов</th></tr>
                        <tr v-for="(p, i) in topPlayers" :key="p.id">
                            <td>{{ i + 1 }}</td>
                            <td>{{ p.name }}</td>
                            <td>{{ p.nickname }}</td>
                            <td>{{ p.total_hours }}</td>
                        </tr>
                    </table>
                    <router-link to="/players" class="btn">Все игроки</router-link>
                </div>
                <div class="section">
                    <h2>Ближайшие турниры</h2>
                    <table>
                        <tr><th>Турнир</th><th>Игра</th><th>Дата</th><th>Приз</th></tr>
                        <tr v-for="t in tournaments" :key="t.id">
                            <td>{{ t.title }}</td>
                            <td>{{ t.short_name }}</td>
                            <td>{{ formatDate(t.date) }}</td>
                            <td>{{ t.prize_pool }} ₽</td>
                        </tr>
                    </table>
                    <router-link to="/tournaments" class="btn">Все турниры</router-link>
                </div>
            </div>
        </div>
    `,
    data() {
        return { stats: { total_players: 0, total_tournaments: 0 }, topPlayers: [], tournaments: [] }
    },
    mounted() {
        fetch(API + '/stats').then(r => r.json()).then(d => this.stats = d)
        fetch(API + '/top-players').then(r => r.json()).then(d => this.topPlayers = d)
        fetch(API + '/tournaments').then(r => r.json()).then(d => this.tournaments = d.slice(0, 5))
    },
    methods: {
        formatDate(d) { return new Date(d).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) }
    }
}

const Players = {
    template: `
        <div>
            <h1>Игроки</h1>
            <table>
                <tr><th>#</th><th>Имя</th><th>Никнейм</th><th>Часов</th><th>По играм</th></tr>
                <tr v-for="(p, i) in players" :key="p.id">
                    <td>{{ i + 1 }}</td>
                    <td>{{ p.name }}</td>
                    <td><strong>{{ p.nickname }}</strong></td>
                    <td>{{ p.total_hours }}</td>
                    <td>
                        <span class="game-tag" v-for="g in p.games" :key="g.game">{{ g.game }}: {{ g.hours }}ч</span>
                    </td>
                </tr>
            </table>
        </div>
    `,
    data() { return { players: [] } },
    mounted() { fetch(API + '/players').then(r => r.json()).then(d => this.players = d) }
}

const Tournaments = {
    template: `
        <div>
            <h1>Турниры</h1>
            <div class="tournament-grid">
                <div class="tournament-card" v-for="t in tournaments" :key="t.id">
                    <div class="tournament-header">
                        <span class="game-badge">{{ t.short_name }}</span>
                        <span :class="['status', t.status]">{{ t.status }}</span>
                    </div>
                    <h3>{{ t.title }}</h3>
                    <p>Игра: {{ t.game_name }}</p>
                    <p>Дата: {{ formatDate(t.date) }}</p>
                    <p>Призовой фонд: {{ t.prize_pool }} ₽</p>
                    <router-link :to="'/tournament/' + t.id" class="btn">Подробнее</router-link>
                </div>
            </div>
        </div>
    `,
    data() { return { tournaments: [] } },
    mounted() { fetch(API + '/tournaments').then(r => r.json()).then(d => this.tournaments = d) },
    methods: {
        formatDate(d) { return new Date(d).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) }
    }
}

const TournamentDetail = {
    template: `
        <div>
            <h1>{{ t.title }}</h1>
            <div class="tournament-info">
                <p><strong>Игра:</strong> {{ t.game_name }}</p>
                <p><strong>Дата:</strong> {{ formatDate(t.date) }}</p>
                <p><strong>Призовой фонд:</strong> {{ t.prize_pool }} ₽</p>
                <p><strong>Статус:</strong> <span :class="['status', t.status]">{{ t.status }}</span></p>
            </div>
            <h2>Участники</h2>
            <table>
                <tr><th>Место</th><th>Имя</th><th>Никнейм</th><th>Приз</th></tr>
                <tr v-for="p in participants" :key="p.id">
                    <td>{{ p.place || '-' }}</td>
                    <td>{{ p.name }}</td>
                    <td><strong>{{ p.nickname }}</strong></td>
                    <td>{{ p.prize || '-' }}</td>
                </tr>
            </table>
            <router-link to="/tournaments" class="btn">К турнирам</router-link>
        </div>
    `,
    data() { return { t: {}, participants: [] } },
    mounted() {
        fetch(API + '/tournaments/' + this.$route.params.id)
            .then(r => r.json())
            .then(d => { this.t = d.tournament; this.participants = d.participants })
    },
    methods: {
        formatDate(d) { return new Date(d).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) }
    }
}

const routes = [
    { path: '/', component: Home },
    { path: '/players', component: Players },
    { path: '/tournaments', component: Tournaments },
    { path: '/tournament/:id', component: TournamentDetail }
]

const router = VueRouter.createRouter({ history: VueRouter.createWebHistory(), routes })
const app = Vue.createApp({})
app.use(router)
app.mount('#app')
    </script>
</body>
</html>
