<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Club</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <nav>
            <div class="nav-container">
                <router-link to="/" class="logo">PC Club</router-link>
                <div class="nav-links">
                    <router-link to="/">Главная</router-link>
                    <router-link to="/players">Игроки</router-link>
                    <router-link to="/tournaments">Турниры</router-link>
                </div>
            </div>
        </nav>
        <main>
            <router-view></router-view>
        </main>
    </div>

    <script>
const DATA_URL = 'data.json'

const store = Vue.reactive({ data: null })
async function loadData() {
    const r = await fetch(DATA_URL)
    Object.assign(store, { data: await r.json() })
}

function fmtDate(d) {
    return new Date(d).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
}

const Home = {
    template: `
        <div v-if="ready">
            <div class="hero">
                <h1>PC Club</h1>
                <p>Киберспортивный клуб — турниры, рейтинги, статистика</p>
            </div>
            <div class="stats">
                <div class="stat-card"><h3>{{ data.players.length }}</h3><p>Игроков</p></div>
                <div class="stat-card"><h3>{{ data.tournaments.length }}</h3><p>Турниров</p></div>
            </div>
            <div class="sections">
                <div class="section">
                    <h2>Топ игроков</h2>
                    <table>
                        <tr><th>#</th><th>Имя</th><th>Ник</th><th>Часов</th></tr>
                        <tr v-for="(p, i) in top" :key="p.id">
                            <td>{{ i + 1 }}</td>
                            <td>{{ p.name }}</td>
                            <td>{{ p.nickname }}</td>
                            <td>{{ p.total_hours }}</td>
                        </tr>
                    </table>
                    <router-link to="/players" class="btn">Все игроки</router-link>
                </div>
                <div class="section">
                    <h2>Ближайшие турниры</h2>
                    <table>
                        <tr><th>Турнир</th><th>Игра</th><th>Дата</th><th>Приз</th></tr>
                        <tr v-for="t in upcoming" :key="t.id">
                            <td>{{ t.title }}</td>
                            <td>{{ t.short_name }}</td>
                            <td>{{ fmtDate(t.date) }}</td>
                            <td>{{ t.prize_pool }} ₽</td>
                        </tr>
                    </table>
                    <router-link to="/tournaments" class="btn">Все турниры</router-link>
                </div>
            </div>
        </div>
    `,
    computed: {
        data() { return store.data },
        ready() { return !!store.data },
        top() { return this.data.players.slice(0, 5) },
        upcoming() { return this.data.tournaments.slice(0, 5) }
    },
    methods: { fmtDate }
}

const Players = {
    template: `
        <div v-if="ready">
            <h1>Игроки</h1>
            <table>
                <tr><th>#</th><th>Имя</th><th>Никнейм</th><th>Часов</th><th>По играм</th></tr>
                <tr v-for="(p, i) in data.players" :key="p.id">
                    <td>{{ i + 1 }}</td>
                    <td>{{ p.name }}</td>
                    <td><strong>{{ p.nickname }}</strong></td>
                    <td>{{ p.total_hours }}</td>
                    <td>
                        <span class="game-tag" v-for="g in p.games" :key="g.game">{{ g.game }}: {{ g.hours }}ч</span>
                    </td>
                </tr>
            </table>
        </div>
    `,
    computed: { data() { return store.data }, ready() { return !!store.data } }
}

const Tournaments = {
    template: `
        <div v-if="ready">
            <h1>Турниры</h1>
            <div class="tournament-grid">
                <div class="tournament-card" v-for="t in data.tournaments" :key="t.id">
                    <div class="tournament-header">
                        <span class="game-badge">{{ t.short_name }}</span>
                        <span :class="['status', t.status]">{{ t.status }}</span>
                    </div>
                    <h3>{{ t.title }}</h3>
                    <p>Игра: {{ t.game_name }}</p>
                    <p>Дата: {{ fmtDate(t.date) }}</p>
                    <p>Призовой фонд: {{ t.prize_pool }} ₽</p>
                    <router-link :to="'/tournament/' + t.id" class="btn">Подробнее</router-link>
                </div>
            </div>
        </div>
    `,
    computed: { data() { return store.data }, ready() { return !!store.data } },
    methods: { fmtDate }
}

const TournamentDetail = {
    template: `
        <div v-if="ready">
            <h1>{{ t.title }}</h1>
            <div class="tournament-info">
                <p><strong>Игра:</strong> {{ t.game_name }}</p>
                <p><strong>Дата:</strong> {{ fmtDate(t.date) }}</p>
                <p><strong>Призовой фонд:</strong> {{ t.prize_pool }} ₽</p>
                <p><strong>Статус:</strong> <span :class="['status', t.status]">{{ t.status }}</span></p>
            </div>

            <div class="prize-section">
                <h2>Распределение призов</h2>
                <div class="prize-podium">
                    <div class="prize-item gold"><span class="medal">1</span>{{ t.prizes[0] }} ₽</div>
                    <div class="prize-item silver"><span class="medal">2</span>{{ t.prizes[1] }} ₽</div>
                    <div class="prize-item bronze"><span class="medal">3</span>{{ t.prizes[2] }} ₽</div>
                </div>
            </div>

            <div class="bracket-section">
                <h2>Сетка турнира</h2>
                <div v-if="bracket" class="bracket">
                    <div class="bracket-round" v-for="(round, ri) in bracket.rounds" :key="ri">
                        <div class="round-label">{{ round.name }}</div>
                        <div class="match" v-for="(m, mi) in round.matches" :key="mi"
                             :class="{ winner: ri === bracket.rounds.length - 1 }">
                            <div class="match-players">
                                <div class="match-player" :class="{ win: m.score1 !== null && m.score1 > m.score2 }">
                                    <span class="nick">{{ playerName(m.player1_id) }}</span>
                                    <span class="score">{{ m.score1 !== null ? m.score1 : '?' }}</span>
                                </div>
                                <div class="match-player" :class="{ win: m.score2 !== null && m.score2 > m.score1 }">
                                    <span class="nick">{{ playerName(m.player2_id) }}</span>
                                    <span class="score">{{ m.score2 !== null ? m.score2 : '?' }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div v-else class="bracket-placeholder">
                    <p>Сетка формируется</p>
                </div>
            </div>

            <div v-if="champion" class="champion-section">
                <h2>Чемпион</h2>
                <div class="champion-card">
                    <div class="trophy">&#127942;</div>
                    <div class="champion-info">
                        <div class="champion-name">{{ champion.name }}</div>
                        <div class="champion-nick">{{ champion.nickname }}</div>
                        <div class="champion-prize">{{ champion.prize }} &#8381;</div>
                    </div>
                </div>
            </div>

            <h2>Участники</h2>
            <table>
                <tr><th>Место</th><th>Имя</th><th>Никнейм</th><th>Приз</th></tr>
                <tr v-for="p in participants" :key="p.id">
                    <td>{{ p.place || '-' }}</td>
                    <td>{{ p.name }}</td>
                    <td><strong>{{ p.nickname }}</strong></td>
                    <td>{{ p.prize ? p.prize + ' \u20BD' : '-' }}</td>
                </tr>
            </table>
            <router-link to="/tournaments" class="btn">К турнирам</router-link>
        </div>
    `,
    computed: {
        data() { return store.data },
        ready() { return !!store.data },
        t() {
            return this.data.tournaments.find(t => t.id == this.$route.params.id) || {}
        },
        bracket() {
            return this.data.matches.find(m => m.tournament_id == this.$route.params.id)
        },
        champion() {
            if (this.t.status !== 'completed') return null
            const pdata = this.data.participants.find(p => p.tournament_id == this.$route.params.id)
            if (!pdata) return null
            const winner = pdata.players.find(p => p.place === 1)
            if (!winner) return null
            return this.data.players.find(p => p.id == winner.id) || null
        },
        participants() {
            const pdata = this.data.participants.find(p => p.tournament_id == this.$route.params.id)
            if (!pdata) return []
            return pdata.players.map(entry => {
                const player = this.data.players.find(p => p.id == entry.id)
                return player ? { ...player, place: entry.place, prize: entry.prize } : null
            }).filter(Boolean)
        }
    },
    methods: {
        fmtDate,
        playerName(id) {
            const p = this.data.players.find(p => p.id == id)
            return p ? p.nickname : '?'
        }
    }
}

const routes = [
    { path: '/', component: Home },
    { path: '/players', component: Players },
    { path: '/tournaments', component: Tournaments },
    { path: '/tournament/:id', component: TournamentDetail }
]

const router = VueRouter.createRouter({ history: VueRouter.createWebHistory(), routes })
const app = Vue.createApp({})
app.use(router)
app.mount('#app')

loadData()
    </script>
</body>
</html>
